services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aria}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aria}
      POSTGRES_DB: ${POSTGRES_DB:-aria}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aria} -d ${POSTGRES_DB:-aria}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports: ["6379:6379"]

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-aria}:${POSTGRES_PASSWORD:-aria}@db:5432/${POSTGRES_DB:-aria}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db: { condition: service_healthy }
    ports: ["8000:8000"]
    volumes:
      - ..:/app
    command: >
      sh -c "cd /app/backend && alembic upgrade head &&
             cd /app && uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload --proxy-headers"

  frontend:
    build:
      context: ../frontend
      target: dev
    restart: unless-stopped
    environment:
      BACKEND_INTERNAL_URL: http://backend:8000
      NEXT_PUBLIC_API_BASE: http://localhost:8000
    depends_on: [backend]
    ports: ["3000:3000"]
    volumes:
      - ../frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  db_data:
